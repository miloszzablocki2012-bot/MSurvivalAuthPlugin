name: Build Plugin

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Nadaj uprawnienia Maven Wrapper
        run: chmod +x mvnw

      - name: Zbuduj plugin
        run: ./mvnw clean package

      - name: Wyślij plik JAR
        uses: actions/upload-artifact@v4
        with:
          name: MSurvivalAuth
          path: target/*.jar
